<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body data-page="quiz">
  <div class="app-shell">

    <header class="page-header card">
      <div>
        <p class="eyebrow">Quiz Page</p>
        <h1>Quiz Practice</h1>
        <p class="hero-text">Choose a level and begin practicing.</p>
      </div>
      <div class="header-actions">
        <a class="quick-link" href="flashcards.html">Go to Flashcards</a>
      </div>
    </header>

    <main class="page-layout">

      <!-- LEFT NAV -->
      <aside class="nav-panel card">
        <div class="section-heading">
          <h2>Navigator</h2>
          <p>Move between the two study modes.</p>
        </div>

        <nav class="nav-links">
          <button id="open-levels" class="nav-link" style="width:100%; text-align:left;">
            Quiz Page (Levels)
          </button>
          <a class="nav-link" href="flashcards.html">Flashcards Page</a>
        </nav>
      </aside>

      <!-- MAIN QUIZ AREA -->
      <section class="page-main">
        <section class="card quiz-page-card">

          <div class="section-heading">
            <h2>Quiz Levels</h2>
            <p>10 levels per chapter. Increasing difficulty.</p>
          </div>

          <!-- COLLAPSIBLE LEVEL DROPDOWN -->
          <div class="quiz-level-box">
            <button class="collapse-toggle" type="button">
              Choose Quiz Level
              <span class="arrow">&#9662;</span>
            </button>

            <div id="level-grid" class="level-grid collapsible">
              <!-- Levels injected by app.js -->
            </div>
          </div>

          <div class="quiz-toolbar">
            <div id="quiz-status" class="quiz-status">Choose a level to begin</div>
            <div id="quiz-score-pill" class="quiz-score-pill">Score: 0</div>
          </div>

          <div class="progress-track">
            <div id="quiz-progress-bar" class="progress-bar"></div>
          </div>

          <div id="quiz-panel" class="quiz-panel">
            <div class="quiz-main-column">
              <h3 id="quiz-question" class="quiz-question"></h3>
              <div id="quiz-options" class="quiz-options"></div>
              <div class="quiz-actions">
                <button id="next-question-button" class="primary-button hidden" type="button">Next Question</button>
              </div>
            </div>
            <aside id="quiz-feedback" class="quiz-feedback hidden"></aside>
          </div>

          <div id="quiz-results" class="hidden">
            <div id="quiz-results-summary" class="results-summary"></div>
            <div id="quiz-results-list" class="results-list"></div>
            <div class="quiz-actions">
              <button id="retry-quiz-button" class="secondary-button" type="button">Retry Quiz</button>
              <button id="next-level-button" class="primary-button" type="button">Next Level</button>
            </div>
          </div>

        </section>
      </section>
    </main>
  </div>

  <script src="app.js"></script>

  <!-- COLLAPSIBLE CSS -->
  <style>
    .collapsible { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .collapsible.open { max-height: 1000px; }
    .collapse-toggle {
      width: 100%; background: #0b1f3a; color: #fff; padding: 12px 16px;
      font-size: 1.1rem; border: none; border-radius: 6px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; margin-bottom: 8px;
    }
    .collapse-toggle .arrow { transition: transform 0.3s ease; }
    .collapse-toggle.active .arrow { transform: rotate(180deg); }
    .level-grid .level-button { margin: 6px 0 !important; width: 100%; }
  </style>

  <!-- COLLAPSIBLE JS -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.querySelector(".collapse-toggle");
      const grid = document.querySelector("#level-grid");
      const openLevels = document.querySelector("#open-levels");

      toggle.addEventListener("click", () => {
        toggle.classList.toggle("active");
        grid.classList.toggle("open");
      });

      openLevels.addEventListener("click", () => {
        toggle.classList.add("active");
        grid.classList.add("open");
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
  </script>

</body>
</html>
